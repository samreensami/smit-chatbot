<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="smitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8cc63f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004d99;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)"/>

  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="85" fill="white"/>

  <!-- Inner gradient circle -->
  <circle cx="100" cy="100" r="78" fill="url(#smitGradient)" opacity="0.1"/>

  <!-- SMIT Text -->
  <text x="100" y="95" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#0066cc">
    SMIT
  </text>

  <!-- Tagline -->
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666666">
    Saylani Mass IT Training
  </text>

  <!-- Green accent bar -->
  <rect x="40" y="135" width="120" height="4" rx="2" fill="#8cc63f"/>

  <!-- Code icon -->
  <text x="100" y="165" text-anchor="middle" font-family="Consolas, monospace" font-size="20" fill="#0066cc" opacity="0.7">
    &lt;/&gt;
  </text>
</svg>
